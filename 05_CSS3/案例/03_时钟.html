<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时钟</title>
    <style>
        .dialPlat {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            margin: 40px auto;
            border: 5px solid #ccc;
            box-shadow: 2px 2px 2px #888888;
            position: relative;
        }

        .dialPlat .dial {
            width: 5px;
            height: 10px;
            background-color: rgb(145, 132, 155);
            position: absolute;
            top: 50%;
            margin-top: -15px;
            right: 50%;
            margin-right: -5px;
        }
        .dialPlat .hour{
            width: 10px;
            height: 100px;
            background-color: black;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -25px;
            margin-left: -2.5px;
            z-index: 666;
            transform-origin:20% 20%;
            transform: rotate(0deg);
        }
        .dialPlat .minute{
            width: 8px;
            height: 130px;
            background-color: rgb(50, 34, 194);
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -32.5px;
            margin-left: -2.5px;
            z-index: 555;
            transform-origin:100% 16%;
            transform: rotate(0deg);



        }
        .dialPlat .second{
            width: 5px;
            height: 140px;
            background-color: rgb(31, 168, 123);
            position: absolute;
            top: 25%;
            left: 50%;
            margin-top: -35px;
            margin-left: -2.5px;
            z-index: 444;
            transform-origin:70% 82%;
            transform: rotate(0deg);
        }

            border-radius: 50%;
            position: absolute;
            z-index: 999;
            background-color: red;
        } */
    </style>
</head>

<body>

        <div class="dial"></div>

        <div class="minute" id="minute">

        <div class="second" id="second"></div>

        for(var i=0;i<dial.length;i++){
