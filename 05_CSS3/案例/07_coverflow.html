<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .stage{
            margin: 40px auto;
            width: 800px;
            height: 600px;
            position: relative;
        }
        .stage .box{
            width: 600px;
            height: 300px;
            perspective: 3000px;
            transform-style: preserve-3d;
            position: absolute;
            top: 50%;
            margin-top: -150px;
            left: 50%;
            margin-left: -300px;
            transition: all 1s ease 0s;
            position: relative;
        }
        .stage .box p{
            width: 300px;
            height: 300px;
            position: absolute;
            top: 50%;
            margin-top: -150px;
            left: 50%;
            margin-left: -150px;
        }
        .stage .box p img{
            width: 300px;
            height: 300px;
        }
        
    

    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="box" id="box">
            <p><img src="../images/1.jpg" alt=""></p>
            <p><img src="../images/2.jpg" alt=""></p>
            <p><img src="../images/3.jpg" alt=""></p>
            <p><img src="../images/4.jpg" alt=""></p>
            <p><img src="../images/5.jpg" alt=""></p>
            <p><img src="../images/6.jpg" alt=""></p>
            <p><img src="../images/7.jpeg" alt=""></p>
            <p><img src="../images/8.jpeg" alt=""></p>
            <p><img src="../images/9.jpg" alt=""></p>
        </div>
    </div>
    <script>
        var box=document.getElementById('box');
        var p=document.getElementsByTagName('p');
        var stage=document.getElementById('stage');
        var idx=4;
        // translateX()表示往左
        function render(){
            // 比idx小的
            for(var i=0;i<idx;i++){
                p[i].style.transform='rotateY(30deg) translateX(100px)  translateZ('+-300*(i+1)+'px) ';
            }
            // 和idx一样的
            p[idx].style.transform='rotateX(30deg)  translateX(100px) translateZ(-10px)';
            for(var j=idx+1;j<9;j++){
                p[j].style.transform='rotateY(-30deg) translateX(100px)  translateZ('+-300*(j-idx)+'px) ';
            }
            // 比idx大的
        }
        render();
    </script>
</body>
</html>
