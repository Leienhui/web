<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function zero(n) {
            var str = String(n);
            var length = 0;
            for (var i = 0; i < str.length; i++) {
                if (str[i] == '0') {
                    length++;
                }
            }
            return length;
        }
        var arr1 = [1000, 230, 500, 1700000, 180000];
       arr1.sort(function (a,b){
           return zero(a)-zero(b);
       })
        console.log(arr1);

    </script>
</body>
</html>
