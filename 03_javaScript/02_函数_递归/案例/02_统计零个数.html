<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function zero(n){
            var arr=String(n).split('');
            var length=0;
            for(var i=0;i<arr.length;i++){
                if(Number(arr[i])==0){
                    length++;
                }
            }
            return length;
        }
        var a=zero(10001);
        console.log(a);
    </script>
</body>
</html>
