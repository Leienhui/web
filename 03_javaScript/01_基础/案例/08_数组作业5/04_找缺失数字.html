<body>
    <script>
        //  给你一个数组[0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11]，其中有一个数字缺失，请把缺失的数字找出来。
        var arr = [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11];
        var newArr = [];
        var i = 0;
        while (newArr.length == 0) {
            if (!arr.includes(arr[i] + 1)) {
                newArr.push(arr[i] + 1);
            }
            i++;

        }
        console.log(newArr);

    </script>
</body>
