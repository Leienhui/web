<!DOCTYPE html>

<body>
    <script>
        // 5.	数组[1, 3, 4, 5, 3, 5, 4, 3, 1]是不是对称的？如果是则显示“是”，不是则显示“不是”。

        // var arr = [1, 3, 4, 5, 3, 5, 5, 5, 5, 5, 5, 4, 3, 1, 1];
        var arr = [1, 2, 3, 4, 5, 5, 4, 3, 2, 1];
        var flag = true;
        for (var star = 0, end = arr.length-1; star < end; star++, end--) {
            if (arr[star] != arr[end]) {
                console.log(arr + "数组不是对称的");
                flag = false;
            }
        }
        if (flag) {
            console.log(arr + "数组是对称的");
        }
    </script>
</body>

</html>
