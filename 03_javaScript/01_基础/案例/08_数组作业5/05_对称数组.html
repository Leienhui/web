<body>
    <script>
        // 5.	数组[1, 3, 4, 5, 3, 5, 4, 3, 1]是不是对称的？如果是则显示“是”，不是则显示“不是”。
        // var arr = [1, 2, 3, 4, 4,5,5, 3, 2,2,2, 1];
        // var arr = [1, 3, 4, 5, 3, 5, 5, 5, 5, 5, 5, 4, 3, 1, 1];
        var arr = [1,2,3,4,5,5,4,3,2,1];

        var i = 0;
        var j = 0;
        var center = 0;
        if (arr.length % 2 == 0) {
                center = arr.length / 2;
                j = center;

            } else {
                center = (arr.length - 1) / 2;
                j = center + 1;
            }
            i = center - 1;
        while (true) {
            if (arr[i] != arr[j]) {
                console.log(arr + "数组不是对称的");
                break ;
            }
            else {
                if (i == 0 && j == arr.length - 1) {
                    console.log(arr + "数组是对称的");
                    break ;
                }
                i--;
                j++;
            }
        }

    </script>
