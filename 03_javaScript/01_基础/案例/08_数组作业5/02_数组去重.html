<body>
    <script>
        // 2.	数组去重：指定数组[1, 1, 1, 2, 2, 3, 3, 2, 1, 4]，它内部有很多重复的项，请打印没有重复项的数字，即 [1, 2, 3, 4]。
        var arr=[1, 1, 1, 2, 2, 3, 3, 2, 1, 4];
        var newArr=[];
        for(var i=0;i<arr.length;i++){
            if(!newArr.includes(arr[i])){
                newArr.push(arr[i]);
            }
        }
        console.log(newArr);
    </script>
</body>
