<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        img{
            width: 300px;
        }
    </style>
</head>
<body>
    <a href="javascript:;" id="btn1">图片1</a>
    <a href="javascript:;" id="btn2">图片2</a>
    <div ><img src="../images/3.jpg" alt="" id="box"></div>
    <script>
        var btn1=document.getElementById("btn1");
        var btn2=document.getElementById("btn2");
        var box=document.getElementById("box");
        btn1.onclick=function (){
            box.src="../images/4.jpg"
        }
        btn2.onclick=function(){
            box.src="../images/3.jpg";
        }
    </script>
</body>
</html>
