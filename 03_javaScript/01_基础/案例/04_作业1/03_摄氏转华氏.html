<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" value="请输入当前摄氏温度" onfocus="javascript:if(this.value=='请输入当前摄氏温度')this.value='';" id="input">
    <button id="btn">转华氏</button>
    <h1 id="h1"></h1>
    <script>
        // 华氏 = 9×摄氏 /5+32。
        var input=document.getElementById("input");
        var h1=document.getElementById("h1");
        var btn=document.getElementById("btn");
        btn.onclick=function(){
            var value=parseFloat (input.value);
            var F=9*value/5+32;
            h1.innerHTML=F;
        }
    </script>
</body>
</html>
