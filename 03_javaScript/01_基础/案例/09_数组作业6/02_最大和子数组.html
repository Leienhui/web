<body>
    <script>
        // 2.	给定一个整数数组，找到一个具有最大和的子数组，返回其子数组最大和和这个子数组。

        // 	比如数组[−2, 2, −3, 4, −1, 2, 1, −5, 3]。符合要求的子数组为[4, −1, 2, 1]，其最大和为 6。

        // 	再比如，数组[1, 2, 3, 4]，符合要求的子数组为[1, 2, 3, 4]，其最大和为 10。

        // 	比如数组[-5, 6, -2, -3, 4]，符合要求的子数组为[6, -2, -3, 4]，其最大和为5。

        // 用一个边练存储连续数字的最大和与当前和，进行比较

        var arr = [-2, 2, -3, 4, -1, 2, 1, -5, 3];
        var max = -Infinity;
        var maxSonArr = [];
        for (var i = 0; i < arr.length; i++) {
            for (var j = i + 1; j <= arr.length; j++) {
                // 截取出所有的子数组
                var sonArr = arr.slice(i, j);
                //    求子数组的和
                var sum = 0;
                for (var k = 0; k < sonArr.length; k++) {
                    sum += sonArr[k];
                }
                if (sum > max) {
                    max = sum;
                    maxSonArr = sonArr;
                }
            }
        }
        console.log(maxSonArr+"   "+max);

    </script>
</body>

</html>
