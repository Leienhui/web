<body>
    <script>
        var arr=[23,45,6,7,98,12,55];
        var change=0;
        for(var i=0;i<arr.length;i++){
            for(var j=0;j<arr.length;j++){
                if(arr[i]<arr[j]){
                    change=arr[i];
                    arr[i]=arr[j];
                    arr[j]=change
                }
            }
        }
        console.log(arr);
    </script>
</body>
