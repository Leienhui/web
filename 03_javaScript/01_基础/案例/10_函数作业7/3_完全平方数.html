<body>
    <script>
        // 3.	一个整数，它加上100后是一个完全平方数，再加上168又是一个完全平方数，请问该数是多少？（还行，不难，也不简单）
        function wqpfs(n){
            // 保证返回的结果是整数
            return  Math.sqrt(n)%1==0;
        }
       for(var i=1;i<1000;i++){
           if(wqpfs(i+100)&&wqpfs(i+100+168)){
               console.log(i);
           }
       }
    </script>
