<body>
    <script>
        // 列出1800年到2000年之间的所有闰年。
        // 1、能被4整除而不能被100整除。
        // 2、能被100整除也能被400整除
        for(var i=1800;i<=2000;i++){
            if((i%4==0&&i%100!=0)||(i%100==0&&i%400==0)){
                // alert(i+'是闰年');
                console.log(i);
            }
        }
        console.log("你出来呀");
    </script>
</body>
