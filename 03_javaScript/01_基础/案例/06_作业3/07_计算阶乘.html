<body>
    <script>
        // 8.	计算1! + 2! + 3! + 4! + 5! + …… +9!！表示阶乘，比如4！就是1*2*3*4就是24。 再比如1！就是1。
        var sum=1;
        for(var i=1;i<10;i++){
            sum*=i;
            console.log(i+'的阶乘是'+sum);
        }

    </script>
