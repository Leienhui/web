<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var n = parseInt(prompt("请输入一个数字"));
        var sum = 1;
        var result = 0;
            for (var i = 1; i <= n; i++) {
                sum *= i / (2 * i + 1);
                result += sum;
            }
        alert((result+1)*2);


    </script>
</body>

</html>
