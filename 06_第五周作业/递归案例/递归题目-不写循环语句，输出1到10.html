<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 题目：不写循环语句，输出1到10

        function log(n) {
            console.log(n);
            if (n < 10) {
                log(n + 1);
            }
        }
        log(1);
    </script>
</body>

</html>
