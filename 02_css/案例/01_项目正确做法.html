<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0 auto;
            padding: 0;
        }
        .box{
            margin: 100px auto;
            width: 350px;
            height: 183px;
            border: 1px solid #CBD2D7;
        }
        .box .h1{
            height: 36px;
            line-height: 36px;
            font-style: 19px;
            padding-left: 10px;
            border-bottom: 2px solid #065D99;
            color: #065D99;
            font-weight: bold;
        }
        .box .ul{
            list-style: none;
            padding: 10px 10px 0;
        }
        .box .ul .li{
            width: 330px;
            height: 33px;
            line-height: 33px;
            font-size: 16px;
            font-family: Microsoft Yahei;
            color: #3B3D3F;
            border-bottom: 1px dashed #CBD2D7;
        }
        .box .ul .li a{
            text-decoration: none;
            color: #3B3D3F;
        }

        .box .ul .li .span{
            font-size: 12px;
            font-family: Microsoft Yahei;

        }
        .box .ul .spec{
            border-bottom: none;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1 class="h1">入学通知</h1>
        <ul class="ul">
            <li class="li "><a href="">通知情况</a><span  class="span">[2019年9月21日]</span></li>
            <li class="li"><a href="">通知情况</a><span  class="span">[2019年9月21日]</span></li>
            <li class="li"><a href="">通知情况</a><span  class="span">[2019年9月21日]</span></li>
            <li class="li spec"><a href="">通知情况</a><span  class="span">[2019年9月21日]</span></li>
        </ul>
    </div>
</body>

</html>
