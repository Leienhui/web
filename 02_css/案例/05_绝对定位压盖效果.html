<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 800px;
            height: 533px;
            position: relative;
            margin: 40px auto;
        }
        .box img{
            width: 800px;
            height: 533px;
        }
        .box .content{
            width: 780px;
            height: 30px;
            position: absolute;
            background-color: rgba(12, 112, 170, 0.3);
            bottom: 0;
            left: 0;
            padding-left: 20px;
            line-height: 30px;
        }
        .box ul{
            width: 190px;
            height: 30px;
            position: absolute;
            bottom: 40px;
            right: 10px;
        }
        .box  .btn{
            width: 40px;
            height: 40px;
            background-color: rgb(221, 224, 15);
            position: absolute;
            top: 50%;
            margin-top: -20px;
        }
        .box  .btn.left{
            left: 10px;
        }
        .box  .btn.right{
            right: 10px;
        }
        .box ul li{
            width: 30px;
            height: 30px;
            background-color:rgba(122, 28, 56, 0.6);
            float: left;
            border-radius: 50%;
            list-style: none;
            margin-right: 10px;
        }
        .box ul li.last{
            margin-right: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="../images/5.jpg" alt="">
        <p class="content">给哈哈哈哈哈哈哈哈哈哈哈哈</p>
        <p class="btn left"><a href="javascript:;"></a></p>
        <p class="btn right"><a href="javascript:;"></a></p>
        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li class="last"></li>
        </ul>
    </div>
</body>
</html>
