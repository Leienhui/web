<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul{
            list-style: none;
        }
        li{
            margin: 30px;
        }
    </style>
</head>
<body>
    <input type="text">
    <button class="add">添加</button>
    <ul>
        <li>压力1<button>删除</button></li>
        <li>压力12<button>删除</button></li>
        <li>压力13<button>删除</button></li>
        <li>压力14<button>删除</button></li>
        <li>压力15<button>删除</button></li>
    </ul>
    <!-- 引包 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        // 通过标签名选择元素和选中元素
        // $('ul li').click(function(){
        //     $(this)
            
        // });
        $('.add').click(function(){
            // 获取文本框的值
            var str=$('input').val();
            // 创建节点,并将节点追加到他的父亲上
          $('<li>'+str+'<button>删除</button></li>').appendTo('ul');
        })

    </script>
</body>
</html>
